# /etc/wireguard/wg0.conf (Cloud Ubuntu)
# Copy to /etc/wireguard/wg0.conf and run: sudo systemctl enable wg-quick@wg0 && sudo systemctl start wg-quick@wg0

[Interface]
PrivateKey = <YOUR_CLOUD_PRIVATEKEY>
Address = 10.0.0.2/24
ListenPort = 51820
DNS = 8.8.8.8

PostUp = iptables -A FORWARD -i wg0 -j ACCEPT; iptables -A FORWARD -o wg0 -j ACCEPT; iptables -t nat -A POSTROUTING -o eth0 -j MASQUERADE
PostDown = iptables -D FORWARD -i wg0 -j ACCEPT; iptables -D FORWARD -o wg0 -j ACCEPT; iptables -t nat -D POSTROUTING -o eth0 -j MASQUERADE

[Peer]
PublicKey = <YOUR_GENTOO_PUBLICKEY>
AllowedIPs = 10.0.0.1/32
Endpoint = <YOUR_HOME_FIXED_IP>:51820
PersistentKeepalive = 25
